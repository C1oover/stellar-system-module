name: Release Module

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create module zip
        run: |
          mkdir -p build
          zip -r build/module.zip module.json scripts styles templates lang README.md

      - name: Upload module.json
        uses: softprops/action-gh-release@v2
        with:
          files: module.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload module.zip
        uses: softprops/action-gh-release@v2
        with:
          files: build/module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
